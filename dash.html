<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard | Hospital Systems</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <!-- Mobile Header -->
    <header class="mobile-top-bar">
      <h1><span>✚</span> MedManager</h1>
      <button id="menuToggle" class="btn-icon">☰</button>
    </header>

    <nav id="sidebar">
      <div class="sidebar-header">
        <h1><span>✚</span> MedManager</h1>
      </div>

      <div class="nav-item active">Dashboard</div>
      <div class="nav-item" onclick="viewLoginHistory()">Audit Logs</div>
      <div style="margin-top: auto" class="nav-item">Settings</div>
    </nav>

    <main>
      <div class="header-bar">
        <div class="title-group">
          <h2>Manager Directory</h2>
          <p class="subtitle">Manage administrative accounts and security.</p>
        </div>
        <button class="btn btn-primary" onclick="toggleModal(true)">
          + New Manager
        </button>
      </div>

      <div class="stats-grid">
        <div class="card">
          <div class="stat-label">TOTAL MANAGERS</div>
          <div class="stat-val" id="managerCount">0</div>
        </div>
        <!-- Additional cards stack automatically on mobile -->
      </div>

      <div class="table-container">
        <table id="managerTable">
          <thead>
            <tr>
              <th>Name</th>
              <th>Email</th>
              <th class="text-right">Quick Password Reset</th>
              <th class="text-right">Actions</th>
            </tr>
          </thead>
          <tbody>
            <!-- Rows injected via JS -->
          </tbody>
        </table>
      </div>
    </main>

    <!-- Registration Modal -->
    <div class="modal-overlay" id="modalOverlay">
      <div class="modal">
        <h3>Register Manager</h3>
        <form id="regForm">
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="regName" required placeholder="John Doe" />
          </div>
          <div class="form-group">
            <label>Email Address</label>
            <input
              type="email"
              id="regEmail"
              required
              placeholder="john@hospital.com"
            />
          </div>
          <div class="form-group">
            <label>Temporary Password</label>
            <input
              type="text"
              id="regPass"
              required
              placeholder="Welcome2024!"
            />
          </div>
          <div class="modal-footer">
            <button type="submit" class="btn btn-primary flex-1">
              Create Account
            </button>
            <button
              type="button"
              class="btn btn-secondary"
              onclick="toggleModal(false)"
            >
              Cancel
            </button>
          </div>
        </form>
      </div>
    </div>

    <script src="index.js"></script>
  </body>
</html>
